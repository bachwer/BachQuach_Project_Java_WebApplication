<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{admin/layout/layout :: layout(~{::section}, 'Add New Equipment', 'equipments')}">
<head>
    <title>Add Equipment</title>
</head>
<body>
    <section class="max-w-4xl mx-auto">
        <div class="mb-8">
            <a th:href="@{/admin/equipments}" class="text-xs font-black text-admin-primary uppercase tracking-widest flex items-center gap-2 mb-4 hover:gap-3 transition-all">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Inventory
            </a>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Create Equipment</h2>
            <p class="text-slate-500 font-medium mt-2">Populate the laboratory registry with new resource details.</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-white">
            <form th:action="@{/admin/equipments/create}" th:object="${equipment}" method="post" class="space-y-8">
                <!-- Hidden Image URL field -->
                <input type="hidden" th:field="*{imageUrl}" id="hiddenImageUrl">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <!-- Image Upload Area -->
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1 mb-3 block">Equipment Visual</label>
                        
                        <div class="relative aspect-square rounded-[2rem] overflow-hidden bg-slate-50 border-2 border-dashed border-slate-200 hover:border-admin-primary transition-all duration-300">
                            <!-- Input overlaid on top, transparent -->
                            <input
                                id="fileInput"
                                type="file"
                                accept="image/*"
                                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30"
                                onchange="handleImagePreview(event)"
                            />

                            <!-- Label (UI only) -->
                            <label class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 group pointer-events-none z-20">
                                <div id="placeholderUI" class="space-y-4">
                                    <div class="w-16 h-16 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-300 group-hover:text-admin-primary transition-colors mx-auto">
                                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                    </div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Image</p>
                                </div>
                            </label>

                            <!-- Preview Container -->
                            <div class="absolute inset-0 w-full h-full z-10 pointer-events-none">
                                <img
                                    id="previewImage"
                                    src=""
                                    class="w-full h-full object-cover hidden"
                                >
                            </div>

                            <!-- Loading Overlay -->
                            <div id="uploadLoader" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-30">
                                <div class="w-10 h-10 border-4 border-slate-100 border-t-admin-primary rounded-full animate-spin"></div>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Equipment Code</label>
                            <input type="text" th:field="*{code}" required placeholder="EQ-001" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Resource Name</label>
                            <input type="text" th:field="*{name}" required placeholder="Name of device" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Category Group</label>
                            <select th:field="*{categoryId}" required class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700 appearance-none">
                                <option value="" disabled selected>Select Classification</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Inventory Status</label>
                            <div class="flex items-center gap-4 py-4 px-6 bg-slate-50/50 rounded-2xl border border-slate-100">
                                <input type="checkbox" th:field="*{isActive}" id="isActive" class="w-6 h-6 rounded-lg border-slate-200 text-admin-primary focus:ring-indigo-100 cursor-pointer">
                                <label for="isActive" class="text-xs font-black text-slate-600 cursor-pointer uppercase tracking-widest">Active Record</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Total Capacity</label>
                        <input type="number" th:field="*{quantityInStock}" required min="0" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Current Available</label>
                        <input type="number" th:field="*{currentStock}" required min="0" class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Resource Specification</label>
                    <textarea th:field="*{description}" rows="4" placeholder="Detailed technical specifications or usage notes..." class="w-full px-6 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-admin-primary outline-none transition-all font-bold text-slate-700 resize-none"></textarea>
                </div>

                <div class="pt-10 flex flex-col sm:flex-row gap-4">
                    <button type="submit" class="flex-1 py-5 rounded-2xl bg-admin-primary text-white font-black text-sm uppercase tracking-[0.2em] shadow-xl hover:bg-admin-secondary transition-all">
                        Register Equipment
                    </button>
                    <a th:href="@{/admin/equipments}" class="px-12 py-5 rounded-2xl bg-slate-100 text-slate-600 font-black text-sm uppercase tracking-[0.2em] hover:bg-slate-200 transition-all flex items-center justify-center">
                        Discard
                    </a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
