<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/layout :: layout(~{::section}, 'Edit Lecturer', 'lecturers')}">
<body>
<section class="max-w-4xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="/admin/users/lecturers" class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-900 transition-all">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Edit Lecturer</h2>
            <p class="text-slate-500 font-medium">Update profile and account information for <span th:text="${lecturer.fullName}" class="text-indigo-600"></span></p>
        </div>
    </div>

    <!-- Alert Messages -->
    <div th:if="${successMessage}" class="mb-6 p-4 bg-emerald-50 border border-emerald-100 text-emerald-600 rounded-2xl flex items-center gap-3 animate-fade-in">
        <i class="fa-solid fa-circle-check text-lg"></i>
        <p class="font-bold text-sm" th:text="${successMessage}"></p>
    </div>
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-rose-50 border border-rose-100 text-rose-600 rounded-2xl flex items-center gap-3 animate-fade-in">
        <i class="fa-solid fa-circle-exclamation text-lg"></i>
        <p class="font-bold text-sm" th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/admin/users/lecturers/update/{id}(id=${id})}" th:object="${lecturer}" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Account Info -->
            <div class="md:col-span-2">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-indigo-500"></i>
                    Account Information
                </h3>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Email Address (Login)</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" th:field="*{email}" required 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Change Password (Leave blank to keep current)</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" th:field="*{password}" 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <!-- Profile Info -->
            <div class="md:col-span-2 mt-4">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-address-card text-indigo-500"></i>
                    Personal Profile
                </h3>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Full Name</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" th:field="*{fullName}" required 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Phone Number</label>
                <div class="relative">
                    <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" th:field="*{phone}" 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <div class="md:col-span-2 space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Avatar URL</label>
                <div class="relative">
                    <i class="fa-solid fa-image absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" th:field="*{avatarUrl}" 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <!-- Professional Info -->
            <div class="md:col-span-2 mt-4">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-graduation-cap text-indigo-500"></i>
                    Academic Information
                </h3>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Department</label>
                <div class="relative">
                    <i class="fa-solid fa-building-columns absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10"></i>
                    <select th:field="*{departmentId}" required 
                            class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700 appearance-none">
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Academic Rank</label>
                <div class="relative">
                    <i class="fa-solid fa-award absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" th:field="*{academicRank}" placeholder="e.g. Associate Professor" 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>

            <div class="md:col-span-2 space-y-2">
                <label class="text-xs font-bold text-slate-700 ml-1">Specialization</label>
                <div class="relative">
                    <i class="fa-solid fa-brain absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" th:field="*{specialization}" placeholder="e.g. Artificial Intelligence, Data Science" 
                           class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-medium text-slate-700">
                </div>
            </div>
        </div>

        <div class="pt-8 flex gap-4">
            <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-200 hover:-translate-y-1 transition-all">
                Save Changes
            </button>
            <a href="/admin/users/lecturers" class="flex-1 py-4 bg-white text-slate-400 border border-slate-200 rounded-2xl font-black text-xs uppercase tracking-widest text-center hover:bg-slate-50 transition-all">
                Discard Changes
            </a>
        </div>
    </form>
</section>
</body>
</html>
