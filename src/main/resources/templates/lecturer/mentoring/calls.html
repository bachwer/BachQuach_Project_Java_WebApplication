<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{lecturer/layout/layout :: layout(~{::section}, 'Video Call Center', 'video-call')}">
<body>
    <section class="space-y-8 animate-in">
        <!-- Header -->
        <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Video Call Center</h2>
                <p class="text-slate-500 mt-2 font-medium">Join your confirmed mentoring sessions via secure video link.</p>
            </div>
            <div class="relative z-10 w-full md:w-auto">
                <div class="px-8 py-4 bg-emerald-50 rounded-2xl border border-emerald-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center animate-pulse">
                        <i class="fa-solid fa-video"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Active Status</p>
                        <p class="text-sm font-bold text-emerald-900">Online & Ready</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-10 -top-10 opacity-5 text-9xl">
                <i class="fa-solid fa-headset"></i>
            </div>
        </div>

        <!-- Call List -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="item : ${sessions}" class="glass-card p-8 rounded-[3rem] border border-slate-100 hover:border-emerald-200 hover:-translate-y-2 transition-all duration-300 group">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-4">
                        <img th:src="${item.student.profile != null and item.student.profile.avatarUrl != null ? item.student.profile.avatarUrl : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + item.student.email}" 
                             class="w-14 h-14 rounded-2xl shadow-sm border border-slate-100" alt="">
                        <div>
                            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Confirmed Session</p>
                            <h4 class="text-lg font-black text-slate-900" th:text="${item.student.getFullName()}">Student Name</h4>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 p-6 bg-slate-50 rounded-2xl border border-slate-100 mb-8">
                    <div class="flex items-center gap-3 text-sm text-slate-600 font-medium">
                        <i class="fa-solid fa-clock w-5 text-slate-400"></i>
                        <span th:text="${#temporals.format(item.sessionDate, 'MMM dd')} + ' • ' + ${item.startTime}">Time</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm text-slate-600 font-medium">
                        <i class="fa-solid fa-comment-dots w-5 text-slate-400"></i>
                        <span class="italic line-clamp-1" th:text="${item.note}">Topic</span>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <form th:action="@{/lecturer/mentoring/video-call/start/{sessionId}(sessionId=${item.id})}" method="post" target="_blank" class="flex-1">
                        <button type="submit" 
                                class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-emerald-200 hover:shadow-emerald-400 hover:bg-emerald-700 transition-all flex items-center justify-center gap-3 group-hover:scale-[1.02]">
                            <i class="fa-solid fa-video"></i>
                            Join Video Call
                        </button>
                    </form>

                    <form th:action="@{/lecturer/mentoring/complete}" method="post" class="flex-1">
                        <input type="hidden" name="sessionId" th:value="${item.id}">
                        <button type="submit" 
                                class="w-full py-4 bg-white text-rose-500 border-2 border-rose-100 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-rose-50 hover:border-rose-200 transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-check-circle"></i>
                            End Session
                        </button>
                    </form>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(sessions)}" class="col-span-full py-24 bg-white rounded-[4rem] border-2 border-dashed border-slate-100 flex flex-col items-center justify-center text-center">
                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-8 text-slate-200 text-4xl">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
                <h4 class="text-2xl font-black text-slate-400">No Scheduled Calls</h4>
                <p class="text-slate-400 font-bold mt-2">All confirmed mentoring sessions will appear here.</p>
            </div>
        </div>
    </section>
</body>
</html>
