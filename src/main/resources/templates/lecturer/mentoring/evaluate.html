<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{lecturer/layout/layout :: layout(~{::section}, 'Evaluate Student', 'completed')}">
<body>
    <section class="max-w-3xl mx-auto animate-in">
        <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl border border-white/50">
            <!-- Header -->
            <div class="p-10 bg-gradient-to-br from-amber-600 to-amber-700 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <a th:href="@{/lecturer/mentoring/completed}" class="inline-flex items-center gap-2 text-amber-100 hover:text-white transition-colors mb-6 font-bold text-sm">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back to History
                    </a>
                    <h2 class="text-4xl font-black tracking-tight">Student Assessment</h2>
                    <p class="text-amber-100 mt-2 font-medium">Evaluate the student's performance and provide guidance for their growth.</p>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-10 text-[12rem] rotate-12">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
            </div>

            <!-- Form Body -->
            <form th:action="@{/lecturer/evaluation/submit}" method="post" class="p-10 space-y-10 bg-white/50">
                <input type="hidden" name="mentoringSessionId" th:value="${mentoringSession.id}">
                
                <!-- Student Info -->
                <div class="flex items-center gap-6 p-6 bg-slate-50 rounded-[2rem] border border-slate-100" 
                     th:if="${mentoringSession.student != null}">
                    <img th:src="${mentoringSession.student.profile != null and mentoringSession.student.profile.avatarUrl != null ? mentoringSession.student.profile.avatarUrl : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + mentoringSession.student.email}" 
                         class="w-16 h-16 rounded-2xl shadow-sm border-2 border-white" alt="">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Assessing student</p>
                        <h3 class="text-xl font-black text-slate-900" th:text="${mentoringSession.student.getFullName() ?: mentoringSession.student.email}">Student Name</h3>
                        <p class="text-xs text-slate-500 font-bold" th:text="'Topic: ' + ${mentoringSession.note}"></p>
                    </div>
                </div>

                <div class="p-8 bg-rose-50 border-2 border-rose-100 rounded-[2rem] text-center" th:unless="${mentoringSession.student != null}">
                    <div class="w-16 h-16 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-user-slash"></i>
                    </div>
                    <h3 class="text-lg font-black text-rose-900">Student Data Missing</h3>
                    <p class="text-sm text-rose-600 mt-2">The student account for this session is no longer available.</p>
                    <a th:href="@{/lecturer/mentoring/completed}" class="mt-6 inline-block px-8 py-3 bg-rose-500 text-white rounded-xl font-bold text-xs shadow-lg shadow-rose-200">Return to History</a>
                </div>

                <div th:if="${mentoringSession.student != null}" class="space-y-10">
                    <!-- Performance Level -->
                    <div class="space-y-4">
                        <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Performance Level</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <label class="relative flex items-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer hover:bg-amber-50 transition-all has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 group">
                                <input type="radio" name="performanceLevel" value="EXCELLENT" class="hidden" required>
                                <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-trophy"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-900">Excellent</p>
                                    <p class="text-[10px] text-slate-500 font-medium">Exceeded expectations</p>
                                </div>
                            </label>
                            <label class="relative flex items-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer hover:bg-amber-50 transition-all has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 group">
                                <input type="radio" name="performanceLevel" value="GOOD" class="hidden" required>
                                <div class="w-10 h-10 rounded-xl bg-teal-50 text-teal-600 flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-thumbs-up"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-900">Good</p>
                                    <p class="text-[10px] text-slate-500 font-medium">Met all objectives</p>
                                </div>
                            </label>
                            <label class="relative flex items-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer hover:bg-amber-50 transition-all has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 group">
                                <input type="radio" name="performanceLevel" value="AVERAGE" class="hidden" required>
                                <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-900">Average</p>
                                    <p class="text-[10px] text-slate-500 font-medium">Needs minor improvement</p>
                                </div>
                            </label>
                            <label class="relative flex items-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer hover:bg-amber-50 transition-all has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50 group">
                                <input type="radio" name="performanceLevel" value="POOR" class="hidden" required>
                                <div class="w-10 h-10 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                                    <i class="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-black text-slate-900">Poor</p>
                                    <p class="text-[10px] text-slate-500 font-medium">Did not meet objectives</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Detailed Review -->
                    <div class="space-y-4">
                        <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Evaluation Comment</label>
                        <textarea name="evaluationComment" rows="4" required
                                  class="w-full px-8 py-6 rounded-[2rem] bg-white border-2 border-slate-100 text-slate-700 font-medium focus:ring-4 focus:ring-amber-600/10 focus:border-amber-600 transition-all placeholder:text-slate-300"
                                  placeholder="Describe the student's progress, strengths, and areas for improvement..."></textarea>
                    </div>

                    <!-- Recommendation -->
                    <div class="space-y-4">
                        <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Recommendations for Growth</label>
                        <textarea name="recommendation" rows="3"
                                  class="w-full px-8 py-6 rounded-[2rem] bg-white border-2 border-slate-100 text-slate-700 font-medium focus:ring-4 focus:ring-amber-600/10 focus:border-amber-600 transition-all placeholder:text-slate-300"
                                  placeholder="What should the student do next? Suggested resources or practice..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="w-full py-6 rounded-[2rem] bg-amber-600 text-white font-black text-lg shadow-2xl shadow-amber-200 hover:shadow-amber-300 hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3">
                        Submit Student Assessment
                        <i class="fa-solid fa-check-double"></i>
                    </button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
