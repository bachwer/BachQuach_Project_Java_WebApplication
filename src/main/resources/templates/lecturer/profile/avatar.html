<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{lecturer/layout/layout :: layout(~{::section}, 'Agent Designer', 'profile')}">
<body>
<section class="max-w-6xl mx-auto animate-in" x-data="avatarCustomizer()">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Agent Profile Designer</h2>
            <p class="text-sm text-slate-500 font-medium">Chọn nhân vật Agent của bạn (Tức thì 100%)</p>
        </div>
        <div class="flex gap-3">
            <a th:href="@{/lecturer/profile/settings}" class="px-6 py-3 rounded-2xl bg-white border border-amber-100 text-amber-600 font-bold text-sm hover:bg-amber-50 transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Thoát
            </a>
        </div>
    </div>

    <div class="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col lg:flex-row min-h-[600px]">
        <!-- Left Panel: Preview -->
        <div class="w-full lg:w-2/5 bg-slate-900 p-12 flex flex-col items-center justify-center relative overflow-hidden">
            <!-- Grid Background -->
            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#f59e0b 0.5px, transparent 0.5px); background-size: 10px 10px;"></div>

            <div class="relative">
                <div class="absolute inset-0 bg-amber-500 blur-[100px] opacity-30"></div>
                <img :src="previewUrl" class="relative w-72 h-72 md:w-80 md:h-80 rounded-full border-4 border-amber-500/50 p-2 shadow-[0_0_50px_rgba(245,158,11,0.3)] transition-all duration-300">
            </div>

            <div class="mt-12 w-full max-w-xs relative z-10">
                <form th:action="@{/lecturer/profile/avatar/update}" method="post">
                    <input type="hidden" name="avatarUrl" x-model="previewUrl">
                    <button type="submit" class="w-full py-5 rounded-2xl bg-amber-500 text-slate-900 font-black text-lg hover:bg-amber-400 hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-amber-500/20">
                        Lưu Thay Đổi
                    </button>
                </form>
                
                <!-- Success Message -->
                <div th:if="${successMessage}" class="mt-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-center text-xs font-bold animate-pulse">
                    <i class="fa-solid fa-circle-check mr-2"></i>
                    <span th:text="${successMessage}"></span>
                </div>
            </div>
        </div>

        <!-- Right Panel: Grid -->
        <div class="flex-1 flex flex-col bg-white">
            <div class="p-8 border-b border-slate-100 flex items-center justify-between">
                <h3 class="text-xl font-black text-slate-800 tracking-tight">Danh sách Agent khả dụng</h3>
                <span class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded-full text-slate-500 uppercase tracking-widest">Lecturer Units</span>
            </div>

            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
                    <template x-for="agent in agents" :key="agent.name">
                        <button @click="selectAgent(agent)"
                                :class="previewUrl.includes(agent.seed) ? 'ring-4 ring-amber-500 border-transparent bg-amber-50' : 'border-slate-100 hover:border-amber-200 bg-white'"
                                class="group relative flex flex-col items-center p-4 rounded-[2rem] border-2 transition-all duration-300">

                            <img :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${agent.seed}`"
                                 class="w-20 h-20 rounded-full mb-4 group-hover:scale-110 transition-transform">

                            <span class="text-xs font-black text-slate-800" x-text="agent.name"></span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter" x-text="agent.role"></span>

                            <div x-show="previewUrl.includes(agent.seed)" class="absolute top-3 right-3 bg-amber-500 text-white rounded-full p-1 shadow-sm">
                                <i class="fa-solid fa-check text-[8px]"></i>
                            </div>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function avatarCustomizer() {
            return {
                previewUrl: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix',

                agents: [
                    { name: 'Professor-01', seed: 'Felix', role: 'Main Mentor' },
                    { name: 'Expert-02', seed: 'Aneka', role: 'Consultant' },
                    { name: 'Chief-03', seed: 'Caleb', role: 'Head' },
                    { name: 'Director-04', seed: 'Aria', role: 'Management' },
                    { name: 'Doc-05', seed: 'Milo', role: 'Research' },
                    { name: 'Guide-06', seed: 'Zoe', role: 'Support' },
                    { name: 'Commander-07', seed: 'Jasper', role: 'Strategy' },
                    { name: 'Sage-08', seed: 'Luna', role: 'Ethics' },
                    { name: 'Analyst-09', seed: 'Toby', role: 'Technical' },
                    { name: 'Overseer-10', seed: 'Sasha', role: 'System' },
                    { name: 'Architect-11', seed: 'Finn', role: 'Design' },
                    { name: 'Pioneer-12', seed: 'Nala', role: 'Innovation' }
                ],

                selectAgent(agent) {
                    this.previewUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${agent.seed}`;
                },

                init() {
                    const currentAvatar = [(${profile != null and profile.avatarUrl != null ? "'" + profile.avatarUrl + "'" : "null"})];
                    if (currentAvatar) this.previewUrl = currentAvatar;
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e2e8f0; }
    </style>
</section>
</body>
</html>
