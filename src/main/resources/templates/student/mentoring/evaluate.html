<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{student/layout/layout :: layout(~{::section}, 'Evaluate Mentor', 'sessions')}">
<body>
    <section class="max-w-3xl mx-auto animate-fade-in">
        <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl border border-white/50">
            <!-- Header -->
            <div class="p-10 bg-gradient-to-br from-amber-500 to-amber-600 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <a th:href="@{/student/mentoring/my-sessions}" class="inline-flex items-center gap-2 text-amber-100 hover:text-white transition-colors mb-6 font-bold text-sm">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back to History
                    </a>
                    <h2 class="text-4xl font-black tracking-tight">Rate Your Experience</h2>
                    <p class="text-amber-100 mt-2 font-medium">Your feedback helps us maintain high quality mentoring.</p>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-10 text-[12rem] rotate-12">
                    <i class="fa-solid fa-star"></i>
                </div>
            </div>

            <!-- Form Body -->
            <form th:action="@{/student/evaluation/submit}" method="post" class="p-10 space-y-10 bg-white/50" x-data="{ rating: 0 }">
                <input type="hidden" name="mentoringSessionId" th:value="${mentoringSession.id}">
                
                <!-- Session Info -->
                <div class="flex items-center gap-6 p-6 bg-slate-50 rounded-[2rem] border border-slate-100" 
                     th:if="${mentoringSession.lecturer != null}">
                    <img th:src="${mentoringSession.lecturer.profile != null and mentoringSession.lecturer.profile.avatarUrl != null ? mentoringSession.lecturer.profile.avatarUrl : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + mentoringSession.lecturer.email}" 
                         class="w-16 h-16 rounded-2xl shadow-sm border-2 border-white" alt="">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Mentoring with</p>
                        <h3 class="text-xl font-black text-slate-900" th:text="${mentoringSession.lecturer.getFullName()}">Lecturer Name</h3>
                        <p class="text-xs text-slate-500 font-bold" th:text="${#temporals.format(mentoringSession.sessionDate, 'MMM dd, yyyy')} + ' | ' + ${mentoringSession.startTime}"></p>
                    </div>
                </div>
                
                <div class="p-8 bg-rose-50 border-2 border-rose-100 rounded-[2rem] text-center" th:unless="${mentoringSession.lecturer != null}">
                    <div class="w-16 h-16 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-user-slash"></i>
                    </div>
                    <h3 class="text-lg font-black text-rose-900">Lecturer Data Missing</h3>
                    <p class="text-sm text-rose-600 mt-2">We're sorry, but the mentor information for this session is no longer available.</p>
                    <a th:href="@{/student/mentoring/my-sessions}" class="mt-6 inline-block px-8 py-3 bg-rose-500 text-white rounded-xl font-bold text-xs shadow-lg shadow-rose-200">Return to History</a>
                </div>

                <div th:if="${mentoringSession.lecturer != null}" class="space-y-10">
                    <!-- Star Rating -->
                    <div class="space-y-6">
                        <label class="block text-sm font-black text-slate-400 uppercase tracking-widest text-center">How would you rate this session?</label>
                        <div class="flex justify-center gap-4">
                            <template x-for="i in 5">
                                <label class="cursor-pointer group">
                                    <input type="radio" name="rating" :value="i" x-model="rating" class="hidden" required>
                                    <div class="w-16 h-16 rounded-[1.5rem] border-2 flex items-center justify-center text-2xl transition-all duration-300"
                                         :class="rating >= i ? 'bg-amber-500 border-amber-500 text-white shadow-xl shadow-amber-200 scale-110' : 'border-slate-100 text-slate-200 hover:bg-amber-50'">
                                        <i class="fa-solid fa-star"></i>
                                    </div>
                                </label>
                            </template>
                        </div>
                        <p class="text-center text-xs font-black text-amber-600 uppercase tracking-widest h-4" x-text="rating > 0 ? (['Poor', 'Fair', 'Good', 'Very Good', 'Excellent'][rating-1]) : ''"></p>
                    </div>

                    <!-- Feedback Text -->
                    <div class="space-y-4">
                        <label class="block text-sm font-black text-slate-400 uppercase tracking-widest">Additional Feedback</label>
                        <textarea name="feedback" rows="5" required
                                  class="w-full px-8 py-6 rounded-[2rem] bg-white border-2 border-slate-100 text-slate-700 font-medium focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 transition-all placeholder:text-slate-300"
                                  placeholder="Describe your experience, what you learned, and any suggestions for improvement..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="w-full py-6 rounded-[2rem] bg-amber-500 text-white font-black text-lg shadow-2xl shadow-amber-200 hover:shadow-amber-300 hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-3">
                        Submit Evaluation
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
