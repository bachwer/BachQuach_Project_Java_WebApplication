<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{student/layout/layout :: layout(~{::section}, 'Book Mentoring Session', 'booking')}">
<head>
    <title>Book Mentor</title>
</head>
<body>
<section class="space-y-8" x-data="{
        showModal: false,
        selectedMentorId: null,
        selectedMentorName: '',
        today: new Date().toISOString().split('T')[0],
        currentTime: new Date().toTimeString().slice(0,5),
        selectedDate: '',
        openModal(id, name) {
            this.selectedMentorId = id;
            this.selectedMentorName = name;
            this.selectedDate = '';
            this.showModal = true;
        }
    }">

    <!-- Mentor List -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Mentor Card -->
        <div th:each="lecturer : ${lecturers}"
             class="glass-card rounded-3xl p-6 group hover:shadow-xl hover:shadow-teal-100 transition-all duration-300">
            <div class="flex items-center gap-4 mb-6">
                <img th:src="${lecturer.user != null and lecturer.user.profile != null and lecturer.user.profile.avatarUrl != null
                        ? lecturer.user.profile.avatarUrl
                        : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' +
                          (lecturer.user != null and lecturer.user.profile != null and lecturer.user.profile.fullName != null
                              ? lecturer.user.profile.fullName
                              : 'User')}"
                     class="w-16 h-16 rounded-2xl border-2 border-teal-50 group-hover:scale-105 transition-transform"
                     alt="Avatar">
                <div>
                    <h3 class="text-lg font-bold text-slate-900 leading-none"
                        th:text="${(lecturer.academicRank != null ? lecturer.academicRank + ' ' : '') +
                                   (lecturer.user != null and lecturer.user.profile != null and lecturer.user.profile.fullName != null
                                       ? lecturer.user.profile.fullName
                                       : 'Lecturer')}">
                        Dr. Felix Vance</h3>
                    <p class="text-xs font-semibold text-teal-600 mt-2 uppercase tracking-wide"
                       th:text="${lecturer.specialization != null ? lecturer.specialization : 'General Mentor'}">IoT & Embedded</p>
                    <div class="flex items-center gap-1 text-amber-400 mt-2">
                        <i class="fa-solid fa-star text-[10px]"></i>
                        <span class="text-xs font-bold text-slate-700">5.0</span>
                        <span class="text-[10px] text-slate-400 font-medium ml-1">(New)</span>
                    </div>
                </div>
            </div>
            <div class="space-y-3 mb-6">
                <div class="flex items-center gap-3 text-xs font-medium text-slate-500">
                    <i class="fa-solid fa-building text-teal-500 w-4 text-center"></i>
                    <span th:text="${lecturer.department != null and lecturer.department.name != null ? lecturer.department.name : 'General Department'}">Department</span>
                </div>
                <div class="flex items-center gap-3 text-xs font-medium text-slate-500">
                    <i class="fa-solid fa-envelope text-teal-500 w-4 text-center"></i>
                    <span th:text="${lecturer.user != null and lecturer.user.email != null ? lecturer.user.email : 'No Email'}">email@example.com</span>
                </div>
            </div>
            <button type="button"
                    th:data-id="${lecturer.id}"
                    th:data-name="${lecturer.user != null and lecturer.user.profile != null and lecturer.user.profile.fullName != null ? lecturer.user.profile.fullName : 'Lecturer'}"
                    @click="openModal($el.dataset.id, $el.dataset.name)"
                    class="w-full py-3 rounded-2xl bg-teal-50 text-student-primary font-bold text-sm group-hover:bg-student-primary group-hover:text-white transition-all shadow-sm">
                View Schedule & Book
            </button>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(lecturers)}"
             class="col-span-full py-12 flex flex-col items-center justify-center bg-white/50 rounded-3xl border border-dashed border-teal-200">
            <div class="w-16 h-16 rounded-full bg-teal-50 text-teal-400 flex items-center justify-center text-2xl mb-4">
                <i class="fa-solid fa-users-slash"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-700">No Mentors Available</h3>
            <p class="text-sm text-slate-500 mt-1">There are currently no active mentors matching your criteria.</p>
        </div>
    </div>

    <!-- Booking Modal -->
    <div x-show="showModal"
         style="display: none;"
         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity"
         x-transition>

        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden"
             @click.away="showModal = false"
             x-transition>

            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-teal-50/50">
                <div>
                    <h3 class="text-lg font-bold text-slate-900">Book Session</h3>
                    <p class="text-xs text-student-primary font-medium mt-0.5"
                       x-text="'Mentor: ' + selectedMentorName"></p>
                </div>
                <button @click="showModal = false"
                        class="w-8 h-8 flex items-center justify-center rounded-full bg-white text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors shadow-sm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-6">
                <form th:action="@{/student/mentoring/book}" method="post" class="space-y-4">
                    <input type="hidden" name="lecturerId" :value="selectedMentorId">

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700">Session Date</label>
                        <input
                                type="date"
                                name="sessionDate"
                                required
                                x-model="selectedDate"
                                :min="today"
                                class="w-full px-4 py-3 rounded-xl border border-teal-100 focus:border-student-primary outline-none bg-slate-50 text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">Start Time</label>
                            <input
                                    type="time"
                                    name="startTime"
                                    required
                                    :min="selectedDate === today ? currentTime : null"
                                    class="w-full px-4 py-3 rounded-xl border border-teal-100 focus:border-student-primary outline-none bg-slate-50 text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">End Time</label>
                            <input
                                    type="time"
                                    name="endTime"
                                    required
                                    class="w-full px-4 py-3 rounded-xl border border-teal-100 focus:border-student-primary outline-none bg-slate-50 text-sm">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700">Note (Optional)</label>
                        <textarea name="note" rows="3"
                                  class="w-full px-4 py-3 rounded-xl border border-teal-100 focus:border-student-primary outline-none bg-slate-50 text-sm"
                                  placeholder="Topics you want to discuss..."></textarea>
                    </div>

                    <div class="pt-4 flex gap-3">
                        <button type="button" @click="showModal = false"
                                class="flex-1 py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm">
                            Cancel
                        </button>
                        <button type="submit"
                                class="flex-1 bg-student-primary text-white py-3 rounded-xl font-bold shadow-lg shadow-teal-200 hover:shadow-teal-300 transition-all text-sm">
                            Confirm Booking
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
