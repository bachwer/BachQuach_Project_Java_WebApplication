<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Academic Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: radial-gradient(circle at bottom left, #f5f3ff 0%, #ffffff 100%); }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased">
    <div class="w-full max-w-5xl flex rounded-[2.5rem] overflow-hidden glass-panel shadow-2xl">
        <!-- Form Section -->
        <div class="w-full lg:w-1/2 p-8 md:p-16 flex flex-col justify-center">
            <div class="mb-10">
                <a href="/login" class="text-xs font-black text-primary-600 uppercase tracking-widest flex items-center gap-2 mb-4 hover:gap-3 transition-all">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to login
                </a>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Create Account</h2>
                <p class="text-slate-500 font-medium mt-2">Join the smart academic community today</p>
            </div>

            <form class="space-y-5" th:action="@{/auth/register}" th:object="${registerRequest}" method="POST">
                <div th:if="${error}" class="rounded-2xl px-4 py-3 text-sm font-bold bg-red-100 text-red-600 border border-red-200">
                    <i class="fa-solid fa-circle-exclamation mr-2"></i> <span th:text="${error}"></span>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <div class="relative group">
                        <i class="fa-solid fa-signature absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-600 transition-colors"></i>
                        <input type="text" th:field="*{fullName}" required placeholder="Enter your full name" 
                               class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                               th:errorclass="'border-red-500 bg-red-50'">
                    </div>
                    <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-xs font-bold text-red-500 ml-1 mt-1 italic"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                        <input type="email" th:field="*{email}" required placeholder="name@university.edu" 
                               class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                               th:errorclass="'border-red-500 bg-red-50'">
                        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-[10px] font-bold text-red-500 ml-1 mt-1 italic"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Phone</label>
                        <input type="text" th:field="*{phone}" placeholder="+84..." 
                               class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                               th:errorclass="'border-red-500 bg-red-50'">
                        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-[10px] font-bold text-red-500 ml-1 mt-1 italic"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Gender</label>
                        <select th:field="*{gender}" required 
                                class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                                th:errorclass="'border-red-500 bg-red-50'">
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                        <p th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="text-[10px] font-bold text-red-500 ml-1 mt-1 italic"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Date of Birth</label>
                        <input type="date" th:field="*{dob}" required 
                               class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                               th:errorclass="'border-red-500 bg-red-50'">
                        <p th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}" class="text-[10px] font-bold text-red-500 ml-1 mt-1 italic"></p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Address</label>
                    <input type="text" th:field="*{address}" required placeholder="Enter your address" 
                           class="w-full px-5 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                           th:errorclass="'border-red-500 bg-red-50'">
                    <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-xs font-bold text-red-500 ml-1 mt-1 italic"></p>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative group">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-600 transition-colors"></i>
                        <input type="password" th:field="*{password}" required placeholder="••••••••" 
                               class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-100 bg-slate-50/50 focus:bg-white focus:border-primary-600 outline-none transition-all font-medium text-slate-700"
                               th:errorclass="'border-red-500 bg-red-50'">
                    </div>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs font-bold text-red-500 ml-1 mt-1 italic"></p>
                </div>

                <div class="flex items-center gap-3 px-1 py-2">
                    <input type="checkbox" id="terms" required class="w-5 h-5 rounded-lg border-slate-200 text-primary-600 focus:ring-primary-500 cursor-pointer">
                    <label for="terms" class="text-sm font-semibold text-slate-600 cursor-pointer">I agree to the <a href="#" class="text-primary-600">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="w-full py-4 rounded-2xl bg-primary-600 text-white font-black text-lg shadow-xl shadow-primary-200 hover:bg-primary-700 active:scale-[0.98] transition-all">
                    Create Account
                </button>
            </form>
        </div>

        <!-- Role Selection Info Section -->
        <div class="hidden lg:flex w-1/2 bg-slate-900 relative overflow-hidden items-center p-16">
            <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-primary-900 opacity-90"></div>
            <div class="relative z-10 text-white space-y-12">
                <div class="space-y-4">
                    <h3 class="text-2xl font-black uppercase tracking-tighter text-primary-400">Choose Your Path</h3>
                    <p class="text-slate-300 font-medium">Join as a student to access labs and mentoring, or as a lecturer to guide the next generation.</p>
                </div>

                <div class="space-y-6">
                    <div class="flex gap-6 p-6 rounded-3xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all cursor-pointer group">
                        <div class="w-14 h-14 rounded-2xl bg-primary-500/20 flex items-center justify-center text-primary-400 text-2xl group-hover:bg-primary-500 group-hover:text-white transition-all">
                            <i class="fa-solid fa-user-graduate"></i>
                        </div>
                        <div>
                            <h4 class="text-lg font-bold">Student</h4>
                            <p class="text-sm text-slate-400 mt-1">Book lab equipment and mentoring sessions.</p>
                        </div>
                    </div>
                    

                </div>
            </div>
            <!-- Decorative blur -->
            <div class="absolute top-[-20%] right-[-10%] w-[80%] h-[80%] bg-primary-600 rounded-full blur-[150px] opacity-20"></div>
        </div>
    </div>
</body>
</html>
